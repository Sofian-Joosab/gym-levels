<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body,#root{height:100%;width:100%;overflow-x:hidden}
body{background:#0a0c10;font-family:'DM Sans','Segoe UI',sans-serif;color:#fff;-webkit-font-smoothing:antialiased}
input::-webkit-outer-spin-button,input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}

::-webkit-scrollbar{display:none}

@keyframes timerPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.03)}}
</style>

// Plate calculator
const calcPlates=(total)=>{
  let perSide=(total-BAR_WEIGHT)/2;
  if(perSide<=0) return [];
  const result=[];
  for(const p of PLATES){while(perSide>=p){result.push(p);perSide-=p}}
  return result;
};

// ═══════════════════════════════════════════════
// REST TIMER
// ═══════════════════════════════════════════════
function RestTimer({duration,onClose,onChangeDuration}){
  const [left,setLeft]=useState(duration);
  const [running,setRunning]=useState(true);
  const intervalRef=useRef(null);
  
  useEffect(()=>{
    if(running && left>0){
      intervalRef.current=setInterval(()=>setLeft(p=>{
        if(p<=1){clearInterval(intervalRef.current);if(navigator.vibrate)navigator.vibrate([200,100,200,100,300]);return 0}
        return p-1;
      }),1000);
    }
    return()=>clearInterval(intervalRef.current);
  },[running,left]);
  
  const pct=((duration-left)/duration)*100;
  const isUp=left===0;
  
  return(
    <div style={{position:"fixed",bottom:60,left:0,right:0,zIndex:150,display:"flex",justifyContent:"center",padding:"0 16px",animation:"slideUp 0.3s ease"}}>
      <div style={{width:"100%",maxWidth:480,background:isUp?"#1a1008":"#13151a",borderRadius:16,padding:"14px 16px",border:`1px solid ${isUp?"#f59e0b44":"#1f2229"}`,boxShadow:"0 -4px 24px rgba(0,0,0,0.5)",animation:isUp?"timerPulse 0.5s ease infinite":"none"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <span style={{fontSize:18}}>{isUp?"✅":"⏱️"}</span>
            <span style={{fontSize:14,fontWeight:700,color:isUp?"#4dff91":"#fff"}}>{isUp?"REST COMPLETE — GO!":fmtTime(left)}</span>
          </div>
          <div style={{display:"flex",gap:4}}>
            {[60,90,120,180].map(d=>(<button key={d} onClick={()=>{onChangeDuration(d);setLeft(d);setRunning(true)}} style={{padding:"4px 8px",borderRadius:6,border:"none",background:duration===d?"#f59e0b":"#0d0f13",color:duration===d?"#000":"#666",fontSize:10,fontWeight:700,cursor:"pointer",...mono}}>{d}s</button>))}
          </div>
        </div>
        <div style={{width:"100%",height:4,background:"#1a1d24",borderRadius:2,overflow:"hidden"}}>
          <div style={{width:`${pct}%`,height:"100%",background:isUp?"#4dff91":"linear-gradient(90deg,#f59e0b,#ef4444)",borderRadius:2,transition:"width 1s linear"}}/>
        </div>
        <div style={{display:"flex",justifyContent:"space-between",marginTop:8}}>
          {!isUp&&<button onClick={()=>setRunning(p=>!p)} style={{padding:"6px 16px",borderRadius:8,border:"none",background:"#0d0f13",color:"#888",fontSize:11,fontWeight:700,cursor:"pointer"}}>{running?"PAUSE":"RESUME"}</button>}
          {!isUp&&<button onClick={()=>{setLeft(duration);setRunning(true)}} style={{padding:"6px 16px",borderRadius:8,border:"none",background:"#0d0f13",color:"#888",fontSize:11,fontWeight:700,cursor:"pointer"}}>RESET</button>}
          <button onClick={onClose} style={{padding:"6px 16px",borderRadius:8,border:"none",background:isUp?"#f59e0b":"#0d0f13",color:isUp?"#000":"#888",fontSize:11,fontWeight:700,cursor:"pointer",marginLeft:"auto"}}>{isUp?"DISMISS":"SKIP"}</button>
        </div>
      </div>
    </div>
  );
}

        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>{ACHIEVEMENTS.map(a=>{const u=state.achievements.includes(a.id);return(<div key={a.id} style={{padding:"12px 10px",borderRadius:10,background:u?"#1a1a10":"#0d0f13",border:`1px solid ${u?"#f59e0b33":"#1a1d24"}`,opacity:u?1:0.4}}><div style={{fontSize:22,marginBottom:4}}>{a.icon}</div><div style={{fontSize:11,fontWeight:700,color:u?"#f59e0b":"#555"}}>{a.name}</div><div style={{fontSize:9,color:"#666",marginTop:2}}>{a.desc}</div></div>)})}</div>
      </div>
      {showSettings&&<SettingsModal state={state} setState={setState} onClose={()=>setShowSettings(false)}/>}
    </div>
  );
}

// ═══════════════════════════════════════════════
// WORKOUT TAB (with all new features)
// ═══════════════════════════════════════════════
function WorkoutTab({state,setState}){
  const days=Object.keys(PROGRAM);
  const [selectedDay,setSelectedDay]=useState(days[0]);
  const [weights,setWeights]=useState({});
  const [completed,setCompleted]=useState({});
  const [showResult,setShowResult]=useState(null);
  const [modalExercise,setModalExercise]=useState(null);
  const [swaps,setSwaps]=useState({});
  const [restTimer,setRestTimer]=useState(false);
  const [sessionStart,setSessionStart]=useState(null);
  const [sessionTime,setSessionTime]=useState(0);
  const [plateCalc,setPlateCalc]=useState(null);
  const [newPRs,setNewPRs]=useState([]);

  const wm=state.weightMemory||{};
  const prs=state.personalRecords||{};
  const exercises=PROGRAM[selectedDay].map((ex,i)=>swaps[`${selectedDay}-${i}`]?{...ex,name:swaps[`${selectedDay}-${i}`]}:ex);

  // Session timer
  useEffect(()=>{
    if(!sessionStart) return;
    const iv=setInterval(()=>setSessionTime(Math.floor((Date.now()-sessionStart)/1000)),1000);
    return()=>clearInterval(iv);
  },[sessionStart]);

  // Auto-fill last weights
  useEffect(()=>{
    const auto={};
    exercises.forEach((ex,i)=>{if(wm[ex.name]&&!weights[i])auto[i]=wm[ex.name].toString()});
    if(Object.keys(auto).length>0)setWeights(p=>({...auto,...p}));
  },[selectedDay]);

  const toggleSet=(ei,si)=>{
    const k=`${ei}-${si}`;
    const wasOff=!completed[k];
    setCompleted(p=>({...p,[k]:!p[k]}));
    if(wasOff){
      if(!sessionStart) setSessionStart(Date.now());
      setRestTimer(true);
      if(navigator.vibrate) navigator.vibrate(30);
    }
  };

  const handleSwap=(ei,alt)=>{setSwaps(p=>({...p,[`${selectedDay}-${ei}`]:alt}));setModalExercise(null)};

  const finishWorkout=()=>{
    let totalXP=0,totalWeight=0,sg={STR:0,END:0,VIT:0,PWR:0,AGI:0,FOR:0};
    const newWM={...(state.weightMemory||{})};
    const newPR={...(state.personalRecords||{})};
    const prsHit=[];

    exercises.forEach((ex,ei)=>{
      const w=parseFloat(weights[ei])||0;let cs=0;
      for(let s=0;s<ex.sets;s++){if(completed[`${ei}-${s}`])cs++}
      const r=parseInt(ex.reps)||10;
      const xp=calcXP(w,r,cs,ex.xpMult);totalXP+=xp;totalWeight+=w*r*cs;
      
      // Save weight memory
      if(w>0 && cs>0) newWM[ex.name]=w;
      
      // Check PR
      if(w>0 && cs>0 && (!newPR[ex.name] || w>newPR[ex.name].weight)){
        newPR[ex.name]={weight:w,date:todayStr()};
        prsHit.push(ex.name);
      }

      if(ex.muscle.includes("Chest")||ex.muscle.includes("Back")||ex.muscle.includes("Shoulders"))sg.STR+=Math.ceil(cs*0.3);
      if(ex.muscle.includes("Quad")||ex.muscle.includes("Ham")||ex.muscle.includes("Glute"))sg.PWR+=Math.ceil(cs*0.3);
      if(ex.muscle.includes("Core"))sg.VIT+=Math.ceil(cs*0.2);
      sg.END+=Math.ceil(cs*0.1);sg.FOR+=Math.ceil(cs*0.1);
      if(ex.muscle.includes("Arms")||ex.muscle.includes("Bic")||ex.muscle.includes("Tri"))sg.AGI+=Math.ceil(cs*0.2);
    });
    
    const bonus=Math.round(totalXP*0.1);totalXP+=bonus;
    const ns={...state};ns.xp+=totalXP;ns.totalWorkouts+=1;ns.totalWeightLifted+=totalWeight;
    if(totalXP>ns.bestDay)ns.bestDay=totalXP;
    const today=new Date().toDateString(),last=ns.lastWorkout?new Date(ns.lastWorkout).toDateString():null,yest=new Date(Date.now()-86400000).toDateString();
    if(last===yest||last===today){if(last!==today)ns.streakDays+=1}else{ns.streakDays=1}
    ns.lastWorkout=new Date().toISOString();
    Object.keys(sg).forEach(s=>{ns.stats[s]=Math.min(50,(ns.stats[s]||1)+sg[s])});
    ACHIEVEMENTS.forEach(a=>{if(!ns.achievements.includes(a.id)&&a.check(ns))ns.achievements.push(a.id)});
    ns.workoutLog=[...(ns.workoutLog||[]),{date:new Date().toISOString(),day:selectedDay,xp:totalXP,weight:totalWeight,duration:sessionTime}].slice(-50);
    ns.weightMemory=newWM;
    ns.personalRecords=newPR;
    setState(ns);
    setShowResult({xp:totalXP,bonus,stats:sg,weight:totalWeight,prevLevel:getLevel(state.xp),newLevel:getLevel(ns.xp),prs:prsHit,duration:sessionTime});
    setNewPRs(prsHit);setCompleted({});setRestTimer(false);setSessionStart(null);setSessionTime(0);
    if(navigator.vibrate)navigator.vibrate([50,50,100]);
  };

  // ─── Results Screen ───
  if(showResult){
    const lu=showResult.newLevel>showResult.prevLevel;
    return(
      <div style={{padding:"40px 16px 100px",textAlign:"center"}}>
        <div style={{background:"linear-gradient(135deg,#1a1025,#13151a)",borderRadius:20,padding:32,border:"1px solid #2a2040",animation:"fadeIn 0.5s ease"}}>
          <div style={{fontSize:48,marginBottom:8,animation:lu?"levelUp 0.6s ease":"none"}}>{lu?"🎉":"⚔️"}</div>
          <div style={{fontSize:24,fontWeight:800,color:"#fff",marginBottom:4}}>{lu?"LEVEL UP!":"Workout Complete!"}</div>
          {lu&&<div style={{fontSize:16,color:"#f59e0b",fontWeight:700,marginBottom:12}}>Level {showResult.newLevel} — {getTitle(showResult.newLevel)}</div>}
          <div style={{display:"inline-block",padding:"8px 24px",borderRadius:20,background:"linear-gradient(90deg,#f59e0b22,#ef444422)",border:"1px solid #f59e0b44",marginBottom:16}}><span style={{fontSize:28,fontWeight:800,color:"#f59e0b",...mono}}>+{showResult.xp} XP</span></div>
          
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6,marginBottom:16}}>
            <div style={{background:"#0d0f13",borderRadius:10,padding:10}}><div style={{fontSize:9,color:"#666"}}>Weight</div><div style={{fontSize:14,fontWeight:700,color:"#fff"}}>{showResult.weight.toLocaleString()}kg</div></div>
            <div style={{background:"#0d0f13",borderRadius:10,padding:10}}><div style={{fontSize:9,color:"#666"}}>Duration</div><div style={{fontSize:14,fontWeight:700,color:"#4dc8ff"}}>{fmtTime(showResult.duration)}</div></div>
            <div style={{background:"#0d0f13",borderRadius:10,padding:10}}><div style={{fontSize:9,color:"#666"}}>Bonus</div><div style={{fontSize:14,fontWeight:700,color:"#4dff91"}}>+{showResult.bonus}</div></div>
          </div>

          {showResult.prs.length>0&&<div style={{background:"#1a1a08",borderRadius:10,padding:12,marginBottom:16,border:"1px solid #f59e0b33",animation:"prGlow 1.5s ease 2"}}>
            <div style={{fontSize:12,fontWeight:800,color:"#f59e0b",marginBottom:6}}>🏆 NEW PERSONAL RECORDS!</div>
            {showResult.prs.map(n=>(<div key={n} style={{fontSize:11,color:"#fff",marginBottom:2}}>{n}</div>))}
          </div>}

          <div style={{textAlign:"left",marginBottom:16}}>
            <div style={{fontSize:12,fontWeight:600,color:"#888",marginBottom:6}}>STAT GAINS</div>
            {Object.entries(showResult.stats).filter(([,v])=>v>0).map(([s,v])=>(<div key={s} style={{display:"flex",justifyContent:"space-between",marginBottom:3,padding:"4px 8px",borderRadius:6,background:"#0d0f13"}}><span style={{fontSize:12,color:STAT_COLORS[s],fontWeight:700}}>{STAT_NAMES[s]}</span><span style={{fontSize:12,color:"#4dff91",fontWeight:700}}>+{v}</span></div>))}
          </div>
          <button onClick={()=>setShowResult(null)} style={{width:"100%",padding:"14px",borderRadius:12,border:"none",background:"linear-gradient(90deg,#f59e0b,#ef4444)",color:"#fff",fontWeight:800,fontSize:15,cursor:"pointer"}}>CONTINUE</button>
        </div>
      </div>
    );
  }

  // ─── Main Workout View ───
  return(
    <div style={{padding:"16px 16px 100px"}}>
      {/* Session Timer Header */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
        <div style={{fontSize:18,fontWeight:800,color:"#fff"}}>🏋️ Training</div>
        {sessionStart&&<div style={{display:"flex",alignItems:"center",gap:6,background:"#13151a",padding:"6px 12px",borderRadius:8,border:"1px solid #1f2229"}}>
          <div style={{width:6,height:6,borderRadius:3,background:"#ef4444",animation:"pulse 1.5s infinite"}}/>
          <span style={{fontSize:13,fontWeight:700,color:"#fff",...mono}}>{fmtTime(sessionTime)}</span>
        </div>}
      </div>

      {/* Day Selector */}
      <div style={{display:"flex",gap:6,marginBottom:14,overflowX:"auto",paddingBottom:4}}>
        {days.map((d,i)=>(<button key={d} onClick={()=>{setSelectedDay(d);setCompleted({})}} style={{padding:"8px 14px",borderRadius:10,border:"none",cursor:"pointer",whiteSpace:"nowrap",background:selectedDay===d?"linear-gradient(90deg,#f59e0b,#ef4444)":"#13151a",color:selectedDay===d?"#fff":"#888",fontWeight:700,fontSize:11,...mono}}>D{i+1}</button>))}
      </div>
      <div style={{fontSize:14,fontWeight:700,color:"#f59e0b",marginBottom:4}}>{selectedDay}</div>
      <div style={{fontSize:10,color:"#666",marginBottom:12,...mono}}>Tap icon for demo · Tap 🔢 for plate calc</div>

      {/* Exercises */}
      {exercises.map((ex,ei)=>{
        const db=EXERCISE_DB[ex.name]||{};
        const iconSvg=EX_ICONS[db.icon||"bench_press"]?.(db.color||"#f59e0b")||"";
        const swapped=!!swaps[`${selectedDay}-${ei}`];
        const lastW=wm[ex.name];
        const pr=prs[ex.name];
        const curW=parseFloat(weights[ei])||0;
        const overloadHint=lastW&&!weights[ei]?null:lastW&&curW<=lastW;
        
        return(
          <div key={ei} style={{background:"#13151a",borderRadius:14,padding:14,marginBottom:10,border:`1px solid ${swapped?"#f59e0b33":"#1f2229"}`}}>
            <div style={{display:"flex",gap:10,alignItems:"center",marginBottom:8}}>
              <button onClick={()=>setModalExercise({...ex,_idx:ei})} style={{width:48,height:48,borderRadius:12,background:`${db.color||'#f59e0b'}12`,border:`1px solid ${db.color||'#f59e0b'}30`,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",flexShrink:0}} dangerouslySetInnerHTML={{__html:iconSvg}}/>
              <div style={{flex:1,minWidth:0}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                  <div><div style={{fontSize:13,fontWeight:700,color:"#fff",lineHeight:1.3}}>{ex.name}</div><div style={{fontSize:10,color:"#666",...mono}}>{ex.muscle} · {ex.sets}×{ex.reps}</div></div>
                  <div style={{fontSize:9,color:"#f59e0b",...mono,background:"#f59e0b15",padding:"3px 8px",borderRadius:6,flexShrink:0}}>×{ex.xpMult}</div>
                </div>
              </div>
            </div>
            
            {/* Weight Memory + Progressive Overload */}
            {lastW&&(<div style={{display:"flex",alignItems:"center",gap:6,marginBottom:6}}>
              <span style={{fontSize:10,color:"#888",...mono}}>Last: {lastW}kg</span>
              {pr&&<span style={{fontSize:10,color:"#f59e0b",...mono}}>PR: {pr.weight}kg</span>}
              <span style={{fontSize:10,color:"#4dff91",...mono,marginLeft:"auto"}}>Try {lastW+2.5}kg ↑</span>
            </div>)}

            <div style={{display:"flex",alignItems:"center",gap:6}}>
              {/* Quick -2.5 button */}
              <button onClick={()=>setWeights(p=>({...p,[ei]:Math.max(0,(parseFloat(p[ei])||lastW||0)-2.5).toString()}))} style={{width:28,height:36,borderRadius:6,border:"none",background:"#0d0f13",color:"#ef4444",fontWeight:800,fontSize:14,cursor:"pointer"}}>−</button>
              
              <input type="number" inputMode="decimal" placeholder="kg" value={weights[ei]||""} onChange={e=>setWeights(p=>({...p,[ei]:e.target.value}))} style={{width:56,padding:"8px 6px",borderRadius:8,border:"1px solid #2a2d35",background:"#0d0f13",color:"#fff",fontSize:14,fontWeight:700,...mono,outline:"none",textAlign:"center"}}/>
              
              {/* Quick +2.5 button */}
              <button onClick={()=>setWeights(p=>({...p,[ei]:((parseFloat(p[ei])||lastW||0)+2.5).toString()}))} style={{width:28,height:36,borderRadius:6,border:"none",background:"#0d0f13",color:"#4dff91",fontWeight:800,fontSize:14,cursor:"pointer"}}>+</button>

              {/* Plate calc button */}
              <button onClick={()=>setPlateCalc(parseFloat(weights[ei])||lastW||60)} style={{width:28,height:36,borderRadius:6,border:"none",background:"#0d0f13",color:"#f59e0b",fontWeight:700,fontSize:12,cursor:"pointer"}}>🔢</button>

              {/* Set buttons */}
              <div style={{display:"flex",gap:3,flex:1,justifyContent:"flex-end"}}>
                {Array.from({length:ex.sets}).map((_,si)=>{const done=completed[`${ei}-${si}`];return(
                  <button key={si} onClick={()=>toggleSet(ei,si)} style={{width:34,height:34,borderRadius:7,border:"none",cursor:"pointer",background:done?"linear-gradient(135deg,#f59e0b,#ef4444)":"#0d0f13",color:done?"#fff":"#444",fontWeight:800,fontSize:11,transition:"all 0.2s",transform:done?"scale(1.05)":"scale(1)",boxShadow:done?"0 2px 8px rgba(245,158,11,0.3)":"none"}}>{done?"✓":si+1}</button>)})}
              </div>
            </div>
          </div>
        );
      })}

      <button onClick={finishWorkout} style={{width:"100%",padding:"16px",borderRadius:14,border:"none",marginTop:8,background:"linear-gradient(90deg,#f59e0b,#ef4444,#ec4899)",color:"#fff",fontWeight:800,fontSize:16,cursor:"pointer",letterSpacing:1,boxShadow:"0 4px 24px rgba(245,158,11,0.3)"}}>⚡ FINISH & GAIN XP</button>
      
      {modalExercise&&<ExerciseModal exercise={modalExercise} onClose={()=>setModalExercise(null)} onSwap={(alt)=>handleSwap(modalExercise._idx,alt)}/>}
      {restTimer&&<RestTimer duration={state.restTimerDuration||90} onClose={()=>setRestTimer(false)} onChangeDuration={(d)=>{const ns={...state,restTimerDuration:d};setState(ns)}}/>}
      {plateCalc!==null&&<PlateCalcModal weight={plateCalc} onClose={()=>setPlateCalc(null)}/>}
    </div>
  );
}

    <div style={{padding:"16px 16px 100px"}}>

        </div>
      </div>
      <div style={{fontSize:13,fontWeight:700,color:"#fff",marginBottom:10}}>Recent Sessions</div>
      {logs.length===0&&<div style={{color:"#444",fontSize:12,textAlign:"center",padding:32}}>No workouts yet</div>}
      {logs.map((log,i)=>(<div key={i} style={{background:"#13151a",borderRadius:12,padding:14,marginBottom:6,border:"1px solid #1f2229",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <div><div style={{fontSize:12,fontWeight:600,color:"#ccc"}}>{log.day}</div><div style={{fontSize:10,color:"#555",...mono}}>{new Date(log.date).toLocaleDateString()}{log.duration?` · ${fmtTime(log.duration)}`:""}</div></div>
        <div style={{textAlign:"right"}}><div style={{fontSize:14,fontWeight:800,color:"#f59e0b"}}>+{log.xp} XP</div><div style={{fontSize:10,color:"#555",...mono}}>{log.weight.toLocaleString()} kg</div></div>
      </div>))}
    </div>
  );
}

// ═══════════════════════════════════════════════
// MAIN APP
// ═══════════════════════════════════════════════
function GymLevels(){
  const [state,setState]=useState(()=>{const s=LS.get("gym-levels-state");return s?{...DEFAULT_STATE,...s}:{...DEFAULT_STATE}});
  const [tab,setTab]=useState("profile");
  const save=useCallback((ns)=>{setState(ns);LS.set("gym-levels-state",ns)},[]);
  return(
    <div style={{minHeight:"100vh",background:"#0a0c10",color:"#fff",fontFamily:"'DM Sans','Segoe UI',sans-serif",maxWidth:480,margin:"0 auto",position:"relative"}}>
      <div style={{padding:"14px 16px",display:"flex",justifyContent:"space-between",alignItems:"center",borderBottom:"1px solid #1a1d24",position:"sticky",top:0,background:"#0a0c10ee",backdropFilter:"blur(12px)",zIndex:50}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}><span style={{fontSize:22}}>⚔️</span><span style={{fontSize:16,fontWeight:800,letterSpacing:-0.5,background:"linear-gradient(90deg,#f59e0b,#ef4444)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>GYM LEVELS</span></div>
        <div style={{display:"flex",alignItems:"center",gap:6}}><span style={{fontSize:12,fontWeight:700,color:"#f59e0b",...mono}}>LVL {getLevel(state.xp)}</span><span style={{fontSize:11,color:"#555"}}>·</span><span style={{fontSize:12,color:"#888",...mono}}>{state.xp.toLocaleString()} XP</span></div>
      </div>
      {tab==="profile"&&<ProfileTab state={state} setState={save}/>}
      {tab==="workout"&&<WorkoutTab state={state} setState={save}/>}
      {tab==="meals"&&<MealsTab state={state} setState={save}/>}
      {tab==="log"&&<LogTab state={state}/>}
      <TabBar active={tab} setActive={setTab}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<GymLevels/>);
</script>
<script>if('serviceWorker' in navigator){window.addEventListener('load',()=>{navigator.serviceWorker.register('sw.js').then(r=>console.log('SW:',r.scope)).catch(console.log)})}</script>
