<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"/>
<meta name="theme-color" content="#0a0c10"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Gym Levels"/>
<link rel="manifest" href="manifest.json"/>
<link rel="apple-touch-icon" href="icons/icon-192.png"/>
<link rel="icon" href="icons/icon-192.png"/>
<title>Gym Levels</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body,#root{height:100%;width:100%;overflow-x:hidden}
body{background:#0a0c10;font-family:'DM Sans','Segoe UI',sans-serif;color:#fff;-webkit-font-smoothing:antialiased}
input::-webkit-outer-spin-button,input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
input[type=number]{-moz-appearance:textfield}
::-webkit-scrollbar{display:none}
@keyframes fadeIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
@keyframes levelUp{0%{transform:scale(1)}50%{transform:scale(1.15)}100%{transform:scale(1)}}
@keyframes slideUp{from{opacity:0;transform:translateY(100%)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeOverlay{from{opacity:0}to{opacity:1}}
</style>
</head>
<body>
<div id="root"></div>

  get(key) { try { const v = localStorage.getItem(key); return v ? JSON.parse(v) : null; } catch { return null; } },
  set(key, val) { try { localStorage.setItem(key, JSON.stringify(val)); } catch(e) { console.error(e); } },
};

// ─── Shared Components ───
function XPBar({xp}) {
  const level = getLevel(xp), cur = XP_PER_LEVEL[level]||0, next = XP_PER_LEVEL[level+1]||XP_PER_LEVEL[XP_PER_LEVEL.length-1];
  const pct = ((xp-cur)/(next-cur))*100;
  return (<div style={{width:"100%"}}><div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:"#8a8f98",marginBottom:4,fontFamily:"'JetBrains Mono',monospace"}}><span>LVL {level}</span><span>{xp-cur} / {next-cur} XP</span></div><div style={{width:"100%",height:10,background:"#1a1d24",borderRadius:5,overflow:"hidden",border:"1px solid #2a2d35"}}><div style={{width:`${Math.min(pct,100)}%`,height:"100%",background:"linear-gradient(90deg, #f59e0b, #ef4444, #ec4899)",borderRadius:5,transition:"width 0.8s cubic-bezier(.4,0,.2,1)",boxShadow:"0 0 12px rgba(245,158,11,0.4)"}}/></div></div>);
}
function StatHex({stat,value,max=50}) {
  const pct = Math.min(value/max*100,100);
  return (<div style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}><span style={{width:32,fontSize:11,fontWeight:700,color:STAT_COLORS[stat],fontFamily:"'JetBrains Mono',monospace"}}>{stat}</span><div style={{flex:1,height:6,background:"#1a1d24",borderRadius:3,overflow:"hidden"}}><div style={{width:`${pct}%`,height:"100%",background:STAT_COLORS[stat],borderRadius:3,transition:"width 0.5s ease",boxShadow:`0 0 8px ${STAT_COLORS[stat]}44`}}/></div><span style={{width:24,textAlign:"right",fontSize:12,color:"#ccc",fontFamily:"'JetBrains Mono',monospace"}}>{value}</span></div>);
}
function TabBar({active,setActive}) {
  const tabs = [{id:"profile",icon:"👤",label:"Profile"},{id:"workout",icon:"🏋️",label:"Train"},{id:"meals",icon:"🍖",label:"Meals"},{id:"log",icon:"📊",label:"Log"}];
  return (<div style={{display:"flex",position:"fixed",bottom:0,left:0,right:0,background:"linear-gradient(180deg, #0d0f13 0%, #0a0c10 100%)",borderTop:"1px solid #1f2229",zIndex:100,padding:"6px 0 env(safe-area-inset-bottom, 8px)"}}>{tabs.map(t=>(<button key={t.id} onClick={()=>setActive(t.id)} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:2,background:"none",border:"none",cursor:"pointer",padding:"6px 0",color:active===t.id?"#f59e0b":"#555",transition:"all 0.2s",transform:active===t.id?"scale(1.05)":"scale(1)"}}><span style={{fontSize:20}}>{t.icon}</span><span style={{fontSize:10,fontWeight:600,letterSpacing:0.5,fontFamily:"'JetBrains Mono',monospace"}}>{t.label}</span></button>))}</div>);
}

// ─── Settings Modal ───

            <div style={{display:"flex",justifyContent:"space-between",fontSize:10,color:"#888",marginBottom:6,fontFamily:"'JetBrains Mono',monospace"}}>
              <span>{current} kg now</span>
              <span>{goal} kg goal</span>
            </div>
            <div style={{width:"100%",height:8,background:"#1a1d24",borderRadius:4,overflow:"hidden"}}>
              <div style={{width:`${Math.min(Math.max(((parseFloat(current)-50)/(parseFloat(goal)-50))*100,5),100)}%`,height:"100%",background:"linear-gradient(90deg, #f59e0b, #4dff91)",borderRadius:4,transition:"width 0.5s ease"}}/>
            </div>
            <div style={{fontSize:11,color:"#f59e0b",marginTop:6,textAlign:"center",fontFamily:"'JetBrains Mono',monospace"}}>
              {parseFloat(goal) > parseFloat(current) ? `${(parseFloat(goal) - parseFloat(current)).toFixed(1)} kg to go` : parseFloat(goal) < parseFloat(current) ? "Goal reached! Set a new one" : "You're at your goal!"}

// ─── Workout ───
function WorkoutTab({state,setState}) {
  const days = Object.keys(PROGRAM);
  const [selectedDay, setSelectedDay] = useState(days[0]);
  const [weights, setWeights] = useState({});
  const [completed, setCompleted] = useState({});
  const [showResult, setShowResult] = useState(null);
  const [modalExercise, setModalExercise] = useState(null);
  const [swaps, setSwaps] = useState({});

  const exercises = PROGRAM[selectedDay].map((ex,i) => swaps[`${selectedDay}-${i}`] ? {...ex, name:swaps[`${selectedDay}-${i}`]} : ex);

  const toggleSet = (ei,si) => { setCompleted(p=>({...p,[`${ei}-${si}`]:!p[`${ei}-${si}`]})); if(navigator.vibrate) navigator.vibrate(30); };
  const handleSwap = (ei,alt) => { setSwaps(p=>({...p,[`${selectedDay}-${ei}`]:alt})); setModalExercise(null); };

  const finishWorkout = () => {
    let totalXP=0,totalWeight=0,sg={STR:0,END:0,VIT:0,PWR:0,AGI:0,FOR:0};
    exercises.forEach((ex,ei)=>{const w=parseFloat(weights[ei])||0;let cs=0;for(let s=0;s<ex.sets;s++){if(completed[`${ei}-${s}`])cs++;}const r=parseInt(ex.reps)||10;const xp=calcXP(w,r,cs,ex.xpMult);totalXP+=xp;totalWeight+=w*r*cs;
      if(ex.muscle.includes("Chest")||ex.muscle.includes("Back")||ex.muscle.includes("Shoulders"))sg.STR+=Math.ceil(cs*0.3);
      if(ex.muscle.includes("Quad")||ex.muscle.includes("Ham")||ex.muscle.includes("Glute"))sg.PWR+=Math.ceil(cs*0.3);
      if(ex.muscle.includes("Core"))sg.VIT+=Math.ceil(cs*0.2);sg.END+=Math.ceil(cs*0.1);sg.FOR+=Math.ceil(cs*0.1);
      if(ex.muscle.includes("Arms")||ex.muscle.includes("Bic")||ex.muscle.includes("Tri"))sg.AGI+=Math.ceil(cs*0.2);});
    const bonus=Math.round(totalXP*0.1);totalXP+=bonus;
    const ns={...state};ns.xp+=totalXP;ns.totalWorkouts+=1;ns.totalWeightLifted+=totalWeight;if(totalXP>ns.bestDay)ns.bestDay=totalXP;
    const today=new Date().toDateString(),last=ns.lastWorkout?new Date(ns.lastWorkout).toDateString():null,yest=new Date(Date.now()-86400000).toDateString();
    if(last===yest||last===today){if(last!==today)ns.streakDays+=1;}else{ns.streakDays=1;}
    ns.lastWorkout=new Date().toISOString();
    Object.keys(sg).forEach(s=>{ns.stats[s]=Math.min(50,(ns.stats[s]||1)+sg[s]);});
    ACHIEVEMENTS.forEach(a=>{if(!ns.achievements.includes(a.id)&&a.check(ns))ns.achievements.push(a.id);});
    ns.workoutLog=[...(ns.workoutLog||[]),{date:new Date().toISOString(),day:selectedDay,xp:totalXP,weight:totalWeight}].slice(-50);
    setState(ns);setShowResult({xp:totalXP,bonus,stats:sg,weight:totalWeight,prevLevel:getLevel(state.xp),newLevel:getLevel(ns.xp)});setCompleted({});
    if(navigator.vibrate)navigator.vibrate([50,50,100]);
  };

  if (showResult) {
    const lu=showResult.newLevel>showResult.prevLevel;
    return (
      <div style={{padding:"40px 16px 100px",textAlign:"center"}}>
        <div style={{background:"linear-gradient(135deg, #1a1025, #13151a)",borderRadius:20,padding:32,border:"1px solid #2a2040",animation:"fadeIn 0.5s ease"}}>
          <div style={{fontSize:48,marginBottom:8,animation:lu?"levelUp 0.6s ease":"none"}}>{lu?"🎉":"⚔️"}</div>
          <div style={{fontSize:24,fontWeight:800,color:"#fff",marginBottom:4}}>{lu?"LEVEL UP!":"Workout Complete!"}</div>
          {lu&&<div style={{fontSize:16,color:"#f59e0b",fontWeight:700,marginBottom:12}}>Level {showResult.newLevel} — {getTitle(showResult.newLevel)}</div>}
          <div style={{display:"inline-block",padding:"8px 24px",borderRadius:20,background:"linear-gradient(90deg, #f59e0b22, #ef444422)",border:"1px solid #f59e0b44",marginBottom:20}}><span style={{fontSize:28,fontWeight:800,color:"#f59e0b",fontFamily:"'JetBrains Mono',monospace"}}>+{showResult.xp} XP</span></div>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:20}}>
            <div style={{background:"#0d0f13",borderRadius:10,padding:12}}><div style={{fontSize:10,color:"#666"}}>Weight Moved</div><div style={{fontSize:16,fontWeight:700,color:"#fff"}}>{showResult.weight.toLocaleString()} kg</div></div>
            <div style={{background:"#0d0f13",borderRadius:10,padding:12}}><div style={{fontSize:10,color:"#666"}}>Bonus XP</div><div style={{fontSize:16,fontWeight:700,color:"#4dff91"}}>+{showResult.bonus}</div></div>
          </div>
          <div style={{textAlign:"left",marginBottom:20}}><div style={{fontSize:12,fontWeight:600,color:"#888",marginBottom:8}}>STAT GAINS</div>
            {Object.entries(showResult.stats).filter(([,v])=>v>0).map(([s,v])=>(<div key={s} style={{display:"flex",justifyContent:"space-between",marginBottom:4,padding:"4px 8px",borderRadius:6,background:"#0d0f13"}}><span style={{fontSize:12,color:STAT_COLORS[s],fontWeight:700}}>{STAT_NAMES[s]}</span><span style={{fontSize:12,color:"#4dff91",fontWeight:700}}>+{v}</span></div>))}
          </div>
          <button onClick={()=>setShowResult(null)} style={{width:"100%",padding:"14px",borderRadius:12,border:"none",background:"linear-gradient(90deg, #f59e0b, #ef4444)",color:"#fff",fontWeight:800,fontSize:15,cursor:"pointer"}}>CONTINUE</button>
        </div>
      </div>
    );
  }

  return (
    <div style={{padding:"16px 16px 100px"}}>
      <div style={{fontSize:18,fontWeight:800,color:"#fff",marginBottom:12}}>🏋️ Training</div>
      <div style={{display:"flex",gap:6,marginBottom:16,overflowX:"auto",paddingBottom:4}}>
        {days.map((d,i)=>(<button key={d} onClick={()=>{setSelectedDay(d);setCompleted({});}} style={{padding:"8px 14px",borderRadius:10,border:"none",cursor:"pointer",whiteSpace:"nowrap",background:selectedDay===d?"linear-gradient(90deg,#f59e0b,#ef4444)":"#13151a",color:selectedDay===d?"#fff":"#888",fontWeight:700,fontSize:11,fontFamily:"'JetBrains Mono',monospace"}}>D{i+1}</button>))}
      </div>
      <div style={{fontSize:14,fontWeight:700,color:"#f59e0b",marginBottom:6}}>{selectedDay}</div>
      <div style={{fontSize:10,color:"#666",marginBottom:14,fontFamily:"'JetBrains Mono',monospace"}}>Tap exercise icon for demo & alternatives</div>

      {exercises.map((ex,ei)=>{
        const db=EXERCISE_DB[ex.name]||{};const iconSvg=EX_ICONS[db.icon||"barbell"]?.(db.color||"#f59e0b")||"";const swapped=!!swaps[`${selectedDay}-${ei}`];
        return (
          <div key={ei} style={{background:"#13151a",borderRadius:14,padding:14,marginBottom:10,border:`1px solid ${swapped?"#f59e0b33":"#1f2229"}`}}>
            <div style={{display:"flex",gap:10,alignItems:"center",marginBottom:10}}>
              <button onClick={()=>setModalExercise({...ex,_idx:ei})} style={{width:48,height:48,borderRadius:12,background:`${db.color||'#f59e0b'}12`,border:`1px solid ${db.color||'#f59e0b'}30`,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",flexShrink:0}} dangerouslySetInnerHTML={{__html:iconSvg}}/>
              <div style={{flex:1,minWidth:0}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                  <div><div style={{fontSize:13,fontWeight:700,color:"#fff",lineHeight:1.3}}>{ex.name}</div><div style={{fontSize:10,color:"#666",fontFamily:"'JetBrains Mono',monospace"}}>{ex.muscle} · {ex.sets}×{ex.reps}</div></div>
                  <div style={{fontSize:9,color:"#f59e0b",fontFamily:"'JetBrains Mono',monospace",background:"#f59e0b15",padding:"3px 8px",borderRadius:6,flexShrink:0}}>×{ex.xpMult}</div>

            {swapped&&<div style={{fontSize:9,color:"#f59e0b",marginBottom:6,fontFamily:"'JetBrains Mono',monospace"}}>🔄 Swapped</div>}

              <input type="number" inputMode="decimal" placeholder="kg" value={weights[ei]||""} onChange={e=>setWeights(p=>({...p,[ei]:e.target.value}))} style={{width:64,padding:"8px 10px",borderRadius:8,border:"1px solid #2a2d35",background:"#0d0f13",color:"#fff",fontSize:14,fontWeight:700,fontFamily:"'JetBrains Mono',monospace",outline:"none"}}/>
              <div style={{display:"flex",gap:4,flex:1,justifyContent:"flex-end"}}>
                {Array.from({length:ex.sets}).map((_,si)=>{const done=completed[`${ei}-${si}`];return(<button key={si} onClick={()=>toggleSet(ei,si)} style={{width:36,height:36,borderRadius:8,border:"none",cursor:"pointer",background:done?"linear-gradient(135deg,#f59e0b,#ef4444)":"#0d0f13",color:done?"#fff":"#444",fontWeight:800,fontSize:12,transition:"all 0.2s",transform:done?"scale(1.05)":"scale(1)",boxShadow:done?"0 2px 8px rgba(245,158,11,0.3)":"none"}}>{done?"✓":si+1}</button>);})}
              </div>
            </div>
          </div>
        );
      })}

      <button onClick={finishWorkout} style={{width:"100%",padding:"16px",borderRadius:14,border:"none",marginTop:8,background:"linear-gradient(90deg, #f59e0b, #ef4444, #ec4899)",color:"#fff",fontWeight:800,fontSize:16,cursor:"pointer",letterSpacing:1,boxShadow:"0 4px 24px rgba(245,158,11,0.3)"}}>⚡ FINISH & GAIN XP</button>
      {modalExercise && <ExerciseModal exercise={modalExercise} onClose={()=>setModalExercise(null)} onSwap={(alt)=>handleSwap(modalExercise._idx,alt)}/>}
    </div>
  );
}

// ─── Meals ───
function MealsTab() {
  const [expanded, setExpanded] = useState(null);
  return (
    <div style={{padding:"16px 16px 100px"}}>
      <div style={{fontSize:18,fontWeight:800,color:"#fff",marginBottom:4}}>🍖 Meal Plan</div>
      <div style={{fontSize:11,color:"#f59e0b",marginBottom:2,fontFamily:"'JetBrains Mono',monospace"}}>Early Bird Bulk — 5:30 AM Warrior</div>
      <div style={{fontSize:10,color:"#666",marginBottom:14,fontFamily:"'JetBrains Mono',monospace"}}>{MEAL_PLAN.target}</div>
      <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:14,padding:"8px 12px",background:"#13151a",borderRadius:10,border:"1px solid #1f2229"}}>
        <span style={{fontSize:14}}>⏰</span>
        <span style={{fontSize:11,color:"#ccc"}}>Timed for <strong style={{color:"#f59e0b"}}>5:30 AM training</strong></span>
      </div>
      {MEAL_PLAN.meals.map((meal,i)=>(
        <div key={i} onClick={()=>setExpanded(expanded===i?null:i)} style={{background:"#13151a",borderRadius:14,padding:16,marginBottom:8,border:`1px solid ${expanded===i?"#f59e0b33":"#1f2229"}`,cursor:"pointer",transition:"all 0.2s"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <span style={{fontSize:24}}>{meal.icon}</span>
              <div><div style={{fontSize:13,fontWeight:700,color:"#fff"}}>{meal.name}</div><div style={{fontSize:10,color:"#666",fontFamily:"'JetBrains Mono',monospace"}}>{meal.time}</div></div>
            </div>
            <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end"}}>
              <div style={{fontSize:10,color:"#f59e0b",fontFamily:"'JetBrains Mono',monospace"}}>{meal.macros}</div>
              <div style={{fontSize:14,color:"#555",transition:"transform 0.2s",transform:expanded===i?"rotate(180deg)":"rotate(0)"}}>▾</div>
            </div>
          </div>
          {expanded===i && (
            <div style={{marginTop:12,paddingTop:12,borderTop:"1px solid #1f2229"}}>
              {meal.note&&<div style={{fontSize:11,color:"#f59e0b",marginBottom:10,padding:"6px 10px",background:"#f59e0b08",borderRadius:8,borderLeft:"2px solid #f59e0b33"}}>{meal.note}</div>}
              {meal.items.map((item,j)=>(<div key={j} style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}><div style={{width:4,height:4,borderRadius:2,background:"#f59e0b"}}/><span style={{fontSize:12,color:"#ccc"}}>{item}</span></div>))}
            </div>
          )}
        </div>
      ))}
      <div style={{background:"#13151a",borderRadius:14,padding:16,marginTop:8,border:"1px solid #1f2229"}}>
        <div style={{fontSize:12,fontWeight:700,color:"#fff",marginBottom:8}}>💡 Early Bird Bulking Tips</div>
        {["Pre-workout: eat 20-30 min before — banana + PB is enough","Post-workout within 45 min is critical for AM trainers","Track weekly weight — aim for 0.3-0.5 kg/week gain","If weight stalls, add 200 kcal (extra rice or peanut butter)","Sleep by 9:30-10 PM — you need 7-8hrs for 5 AM wake-ups","Hydrate: 3-4 liters/day, start with 500ml on waking","Creatine monohydrate 5g daily — any time, be consistent","Prep meals the night before to stay on track"].map((tip,i)=>(
          <div key={i} style={{fontSize:11,color:"#999",marginBottom:6,paddingLeft:12,borderLeft:"2px solid #f59e0b33"}}>{tip}</div>
        ))}
      </div>
    </div>
  );
}

// ─── Log ───
function LogTab({state}) {
  const logs=[...(state.workoutLog||[])].reverse();
  return (
    <div style={{padding:"16px 16px 100px"}}>
      <div style={{fontSize:18,fontWeight:800,color:"#fff",marginBottom:16}}>📊 Progress</div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:16}}>
        <div style={{background:"#13151a",borderRadius:12,padding:14,border:"1px solid #1f2229"}}><div style={{fontSize:10,color:"#666",fontFamily:"'JetBrains Mono',monospace"}}>Total XP</div><div style={{fontSize:20,fontWeight:800,color:"#f59e0b"}}>{state.xp.toLocaleString()}</div></div>
        <div style={{background:"#13151a",borderRadius:12,padding:14,border:"1px solid #1f2229"}}><div style={{fontSize:10,color:"#666",fontFamily:"'JetBrains Mono',monospace"}}>Best Session</div><div style={{fontSize:20,fontWeight:800,color:"#4dff91"}}>{state.bestDay} XP</div></div>
      </div>
      <div style={{background:"#13151a",borderRadius:14,padding:16,marginBottom:16,border:"1px solid #1f2229"}}>
        <div style={{fontSize:12,fontWeight:700,color:"#fff",marginBottom:12}}>Level Progress</div>
        <div style={{display:"flex",gap:2,height:40,alignItems:"flex-end"}}>
          {logs.slice(0,20).reverse().map((l,i)=>{const mx=Math.max(...logs.map(x=>x.xp),1);return<div key={i} style={{flex:1,height:`${Math.max((l.xp/mx)*100,8)}%`,borderRadius:3,background:"linear-gradient(180deg, #f59e0b, #ef4444)",opacity:0.5+(i/20)*0.5,minWidth:4}}/>;
          })}
          {logs.length===0&&<div style={{fontSize:11,color:"#444",padding:8}}>Complete workouts to see your chart</div>}
        </div>
      </div>
      <div style={{fontSize:13,fontWeight:700,color:"#fff",marginBottom:10}}>Recent Sessions</div>
      {logs.length===0&&<div style={{color:"#444",fontSize:12,textAlign:"center",padding:32}}>No workouts yet — go train!</div>}
      {logs.map((log,i)=>(<div key={i} style={{background:"#13151a",borderRadius:12,padding:14,marginBottom:6,border:"1px solid #1f2229",display:"flex",justifyContent:"space-between",alignItems:"center"}}><div><div style={{fontSize:12,fontWeight:600,color:"#ccc"}}>{log.day}</div><div style={{fontSize:10,color:"#555",fontFamily:"'JetBrains Mono',monospace"}}>{new Date(log.date).toLocaleDateString()}</div></div><div style={{textAlign:"right"}}><div style={{fontSize:14,fontWeight:800,color:"#f59e0b"}}>+{log.xp} XP</div><div style={{fontSize:10,color:"#555",fontFamily:"'JetBrains Mono',monospace"}}>{log.weight.toLocaleString()} kg</div></div></div>))}
    </div>
  );
}

// ─── Main ───
function GymLevels() {
  const [state, setState] = useState(()=>LS.get("gym-levels-state")||{...DEFAULT_STATE});
  const [tab, setTab] = useState("profile");
  const save = useCallback((ns)=>{setState(ns);LS.set("gym-levels-state",ns);},[]);
  return (
    <div style={{minHeight:"100vh",background:"#0a0c10",color:"#fff",fontFamily:"'DM Sans','Segoe UI',sans-serif",maxWidth:480,margin:"0 auto",position:"relative"}}>
      <div style={{padding:"14px 16px",display:"flex",justifyContent:"space-between",alignItems:"center",borderBottom:"1px solid #1a1d24",position:"sticky",top:0,background:"#0a0c10ee",backdropFilter:"blur(12px)",zIndex:50}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}><span style={{fontSize:22}}>⚔️</span><span style={{fontSize:16,fontWeight:800,letterSpacing:-0.5,background:"linear-gradient(90deg,#f59e0b,#ef4444)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>GYM LEVELS</span></div>
        <div style={{display:"flex",alignItems:"center",gap:6}}><span style={{fontSize:12,fontWeight:700,color:"#f59e0b",fontFamily:"'JetBrains Mono',monospace"}}>LVL {getLevel(state.xp)}</span><span style={{fontSize:11,color:"#555"}}>·</span><span style={{fontSize:12,color:"#888",fontFamily:"'JetBrains Mono',monospace"}}>{state.xp.toLocaleString()} XP</span></div>
      </div>
      {tab==="profile"&&<ProfileTab state={state} setState={save}/>}
      {tab==="workout"&&<WorkoutTab state={state} setState={save}/>}
      {tab==="meals"&&<MealsTab/>}
      {tab==="log"&&<LogTab state={state}/>}
      <TabBar active={tab} setActive={setTab}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<GymLevels/>);
</script>
<script>if('serviceWorker' in navigator){window.addEventListener('load',()=>{navigator.serviceWorker.register('sw.js').then(r=>console.log('SW:',r.scope)).catch(console.log);});}</script>
</body>
</html>
