// ═══ MUSCLE RECOVERY MAP ═══
const MUSCLE_GROUPS=["Chest","Back","Shoulders","Biceps","Triceps","Quads","Hamstrings","Glutes","Calves","Abs","Traps"];
const getMuscleRecovery=(workoutLog)=>{
  const now=Date.now();const recovery={};
  MUSCLE_GROUPS.forEach(m=>{recovery[m]={hours:999,status:"fresh"}});
  (workoutLog||[]).forEach(log=>{
    const hrs=(now-new Date(log.date).getTime())/3600000;
    const day=log.day||"";
    Object.entries(EXERCISE_DB).forEach(([name,db])=>{
      const prog=Object.values(PROGRAM).flat();
      const inDay=prog.some(p=>p.name===name && day.includes(Object.keys(PROGRAM).find(k=>PROGRAM[k].includes(p))));
      if(db.muscles){db.muscles.forEach(m=>{if(recovery[m].hours>hrs)recovery[m]={hours:hrs,status:hrs<24?"sore":hrs<48?"recovering":"fresh"}});}
    });
  });
  return recovery;
};

// ═══ REST TIMER (with superset mode) ═══
function RestTimer({duration,isSuperset,onClose,onChangeDuration}){
  const [left,setLeft]=useState(isSuperset?30:duration);
  const [running,setRunning]=useState(true);
  const iv=useRef(null);
  useEffect(()=>{if(running&&left>0){iv.current=setInterval(()=>setLeft(p=>{if(p<=1){clearInterval(iv.current);if(navigator.vibrate)navigator.vibrate([200,100,200]);return 0}return p-1}),1000)}return()=>clearInterval(iv.current)},[running,left]);
  const pct=((isSuperset?30:duration)-left)/(isSuperset?30:duration)*100;const up=left===0;
  return(
    <div style={{position:"fixed",bottom:60,left:0,right:0,zIndex:150,display:"flex",justifyContent:"center",padding:"0 16px",animation:"slideUp .3s ease"}}>
      <div style={{width:"100%",maxWidth:480,background:up?"#1a1008":"var(--bg2)",borderRadius:16,padding:"12px 16px",border:`1px solid ${up?"var(--amber)44":"var(--border)"}`,boxShadow:"0 -4px 24px rgba(0,0,0,.5)",animation:up?"timerPulse .5s ease infinite":"none"}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
          <div style={{display:"flex",alignItems:"center",gap:8}}>
            <span style={{fontSize:16}}>{up?"✅":isSuperset?"🔄":"⏱️"}</span>
            <span style={{fontSize:14,fontWeight:700,color:up?"var(--green)":"var(--text)"}}>{up?(isSuperset?"NEXT EXERCISE — GO!":"REST DONE — GO!"):fmtTime(left)}</span>
            {isSuperset&&!up&&<span style={{fontSize:9,color:"var(--purple)",...mono,background:"#c84dff20",padding:"2px 6px",borderRadius:4}}>SUPERSET</span>}
          </div>
          {!isSuperset&&<div style={{display:"flex",gap:3}}>{[60,90,120,180].map(d=>(<button key={d} onClick={()=>{onChangeDuration(d);setLeft(d);setRunning(true)}} style={{padding:"3px 6px",borderRadius:5,border:"none",background:duration===d?"var(--amber)":"var(--bg3)",color:duration===d?"#000":"var(--text4)",fontSize:9,fontWeight:700,cursor:"pointer",...mono}}>{d}s</button>))}</div>}
        </div>
        <div style={{width:"100%",height:4,background:"var(--bg3)",borderRadius:2,overflow:"hidden"}}><div style={{width:`${pct}%`,height:"100%",background:up?"var(--green)":isSuperset?"var(--purple)":"linear-gradient(90deg,var(--amber),var(--red))",borderRadius:2,transition:"width 1s linear"}}/></div>
        <div style={{display:"flex",justifyContent:"flex-end",marginTop:6,gap:6}}>
          {!up&&<button onClick={()=>setRunning(p=>!p)} style={{padding:"5px 12px",borderRadius:6,border:"none",background:"var(--bg3)",color:"var(--text3)",fontSize:10,fontWeight:700,cursor:"pointer"}}>{running?"PAUSE":"GO"}</button>}
          <button onClick={onClose} style={{padding:"5px 12px",borderRadius:6,border:"none",background:up?"var(--amber)":"var(--bg3)",color:up?"#000":"var(--text3)",fontSize:10,fontWeight:700,cursor:"pointer"}}>{up?"DISMISS":"SKIP"}</button>
        </div>
      </div>
    </div>
  );
}

// ═══ WORKOUT TAB ═══
function WorkoutTab({state,setState}){
  const days=Object.keys(PROGRAM);
  const [selDay,setSelDay]=useState(days[0]),[weights,setWeights]=useState({}),[completed,setCompleted]=useState({}),[showResult,setShowResult]=useState(null),[modalEx,setModalEx]=useState(null),[swaps,setSwaps]=useState({}),[restTimer,setRestTimer]=useState(false),[ssTimer,setSsTimer]=useState(false),[sessStart,setSessStart]=useState(null),[sessTime,setSessTime]=useState(0),[plateCalc,setPlateCalc]=useState(null),[showWarmup,setShowWarmup]=useState(null);
  const wm=state.weightMemory||{},prs=state.personalRecords||{};
  const exercises=PROGRAM[selDay].map((ex,i)=>swaps[`${selDay}-${i}`]?{...ex,name:swaps[`${selDay}-${i}`]}:ex);

  useEffect(()=>{if(!sessStart)return;const iv=setInterval(()=>setSessTime(Math.floor((Date.now()-sessStart)/1000)),1000);return()=>clearInterval(iv)},[sessStart]);
  useEffect(()=>{const a={};exercises.forEach((ex,i)=>{if(wm[ex.name]&&!weights[i])a[i]=wm[ex.name].toString()});if(Object.keys(a).length>0)setWeights(p=>({...a,...p}))},[selDay]);

  const toggleSet=(ei,si)=>{const k=`${ei}-${si}`;const on=!completed[k];setCompleted(p=>({...p,[k]:on}));
    if(on){if(!sessStart)setSessStart(Date.now());const isSSEx=exercises[ei].name.includes("Superset");if(isSSEx)setSsTimer(true);else setRestTimer(true);if(navigator.vibrate)navigator.vibrate(30)}};
  const handleSwap=(ei,alt)=>{setSwaps(p=>({...p,[`${selDay}-${ei}`]:alt}));setModalEx(null)};

  const finishWorkout=()=>{
    let totalXP=0,totalW=0,sg={STR:0,END:0,VIT:0,PWR:0,AGI:0,FOR:0};
    const nWM={...(state.weightMemory||{})},nPR={...(state.personalRecords||{})},prsHit=[];
    exercises.forEach((ex,ei)=>{const w=parseFloat(weights[ei])||0;let cs=0;for(let s=0;s<ex.sets;s++)if(completed[`${ei}-${s}`])cs++;
      const r=parseInt(ex.reps)||10,xp=calcXP(w,r,cs,ex.xpMult);totalXP+=xp;totalW+=w*r*cs;
      if(w>0&&cs>0)nWM[ex.name]=w;
      if(w>0&&cs>0&&(!nPR[ex.name]||w>nPR[ex.name].weight)){nPR[ex.name]={weight:w,date:todayStr()};prsHit.push(ex.name)}
      if(ex.muscle.includes("Chest")||ex.muscle.includes("Back")||ex.muscle.includes("Shoulders"))sg.STR+=Math.ceil(cs*.3);
      if(ex.muscle.includes("Quad")||ex.muscle.includes("Ham")||ex.muscle.includes("Glute"))sg.PWR+=Math.ceil(cs*.3);
      if(ex.muscle.includes("Core"))sg.VIT+=Math.ceil(cs*.2);sg.END+=Math.ceil(cs*.1);sg.FOR+=Math.ceil(cs*.1);
      if(ex.muscle.includes("Arms")||ex.muscle.includes("Bic")||ex.muscle.includes("Tri"))sg.AGI+=Math.ceil(cs*.2);
    });
    const bonus=Math.round(totalXP*.1);totalXP+=bonus;
    const ns={...state};ns.xp+=totalXP;ns.totalWorkouts+=1;ns.totalWeightLifted+=totalW;if(totalXP>ns.bestDay)ns.bestDay=totalXP;
    const today=new Date().toDateString(),last=ns.lastWorkout?new Date(ns.lastWorkout).toDateString():null,yest=new Date(Date.now()-864e5).toDateString();
    if(last===yest||last===today){if(last!==today)ns.streakDays+=1}else ns.streakDays=1;
    ns.lastWorkout=new Date().toISOString();
    Object.keys(sg).forEach(s=>ns.stats[s]=Math.min(50,(ns.stats[s]||1)+sg[s]));
    ACHIEVEMENTS.forEach(a=>{if(!ns.achievements.includes(a.id)&&a.check(ns))ns.achievements.push(a.id)});
    ns.workoutLog=[...(ns.workoutLog||[]),{date:new Date().toISOString(),day:selDay,xp:totalXP,weight:totalW,duration:sessTime}].slice(-50);
    ns.weightMemory=nWM;ns.personalRecords=nPR;
    setState(ns);setShowResult({xp:totalXP,bonus,stats:sg,weight:totalW,prevLevel:getLevel(state.xp),newLevel:getLevel(ns.xp),prs:prsHit,duration:sessTime});
    setCompleted({});setRestTimer(false);setSsTimer(false);setSessStart(null);setSessTime(0);
    if(navigator.vibrate)navigator.vibrate([50,50,100]);
  };

  if(showResult){const lu=showResult.newLevel>showResult.prevLevel;return(
    <div style={{padding:"40px 16px 100px",textAlign:"center"}}><div style={{background:"linear-gradient(135deg,#1a1025,var(--bg2))",borderRadius:20,padding:32,border:"1px solid #2a2040",animation:"fadeIn .5s ease"}}>
      <div style={{fontSize:48,marginBottom:8,animation:lu?"levelUp .6s ease":"none"}}>{lu?"🎉":"⚔️"}</div>
      <div style={{fontSize:24,fontWeight:800,marginBottom:4}}>{lu?"LEVEL UP!":"Workout Complete!"}</div>
      {lu&&<div style={{fontSize:16,color:"var(--amber)",fontWeight:700,marginBottom:12}}>Level {showResult.newLevel} — {getTitle(showResult.newLevel)}</div>}
      <div style={{display:"inline-block",padding:"8px 24px",borderRadius:20,background:"linear-gradient(90deg,#f59e0b22,#ef444422)",border:"1px solid #f59e0b44",marginBottom:16}}><span style={{fontSize:28,fontWeight:800,color:"var(--amber)",...mono}}>+{showResult.xp} XP</span></div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:6,marginBottom:16}}>
        <div style={{background:"var(--bg3)",borderRadius:10,padding:10}}><div style={{fontSize:9,color:"var(--text4)"}}>Weight</div><div style={{fontSize:14,fontWeight:700}}>{showResult.weight.toLocaleString()}kg</div></div>

        <div style={{background:"var(--bg3)",borderRadius:10,padding:10}}><div style={{fontSize:9,color:"var(--text4)"}}>Bonus</div><div style={{fontSize:14,fontWeight:700,color:"var(--green)"}}>+{showResult.bonus}</div></div>
      </div>

      <div style={{textAlign:"left",marginBottom:16}}><div style={{fontSize:12,fontWeight:600,color:"var(--text3)",marginBottom:6}}>STAT GAINS</div>
        {Object.entries(showResult.stats).filter(([,v])=>v>0).map(([s,v])=>(<div key={s} style={{display:"flex",justifyContent:"space-between",marginBottom:3,padding:"4px 8px",borderRadius:6,background:"var(--bg3)"}}><span style={{fontSize:12,color:STAT_COLORS[s],fontWeight:700}}>{STAT_NAMES[s]}</span><span style={{fontSize:12,color:"var(--green)",fontWeight:700}}>+{v}</span></div>))}

    </div></div>)}

  return(
    <div style={{padding:"16px 16px 100px"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
        <div style={{fontSize:18,fontWeight:800}}>🏋️ Training</div>
        {sessStart&&<div style={{display:"flex",alignItems:"center",gap:6,background:"var(--bg2)",padding:"6px 12px",borderRadius:8,border:"1px solid var(--border)"}}>
          <div style={{width:6,height:6,borderRadius:3,background:"var(--red)",animation:"pulse 1.5s infinite"}}/>
          <span style={{fontSize:13,fontWeight:700,...mono}}>{fmtTime(sessTime)}</span>
        </div>}
      </div>
      <div style={{display:"flex",gap:6,marginBottom:14,overflowX:"auto",paddingBottom:4}}>
        {days.map((d,i)=>(<button key={d} onClick={()=>{setSelDay(d);setCompleted({})}} style={{padding:"8px 14px",borderRadius:10,border:"none",cursor:"pointer",whiteSpace:"nowrap",background:selDay===d?"linear-gradient(90deg,var(--amber),var(--red))":"var(--bg2)",color:selDay===d?"#fff":"var(--text3)",fontWeight:700,fontSize:11,...mono}}>D{i+1}</button>))}
      </div>
      <div style={{fontSize:14,fontWeight:700,color:"var(--amber)",marginBottom:4}}>{selDay}</div>
      <div style={{fontSize:10,color:"var(--text4)",marginBottom:12,...mono}}>Tap icon → demo · 🔢 → plates · 🔥 → warm-up</div>

      {exercises.map((ex,ei)=>{
        const db=EXERCISE_DB[ex.name]||{};const ic=EX_ICONS[db.icon||"bench_press"]?.(db.color||"#f59e0b")||"";
        const swapped=!!swaps[`${selDay}-${ei}`];const lastW=wm[ex.name];const pr=prs[ex.name];const curW=parseFloat(weights[ei])||0;
        const warmup=showWarmup===ei?genWarmup(curW||lastW||0):[];
        return(
          <div key={ei} style={{background:"var(--bg2)",borderRadius:14,padding:14,marginBottom:10,border:`1px solid ${swapped?"var(--amber)33":"var(--border)"}`}}>
            <div style={{display:"flex",gap:10,alignItems:"center",marginBottom:8}}>
              <button onClick={()=>setModalEx({...ex,_idx:ei})} style={{width:54,height:54,borderRadius:12,background:`${db.color||'#f59e0b'}12`,border:`1px solid ${db.color||'#f59e0b'}30`,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",flexShrink:0}} dangerouslySetInnerHTML={{__html:ic}}/>
              <div style={{flex:1,minWidth:0}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                  <div><div style={{fontSize:13,fontWeight:700,lineHeight:1.3}}>{ex.name}</div><div style={{fontSize:10,color:"var(--text4)",...mono}}>{ex.muscle} · {ex.sets}×{ex.reps}</div></div>
                  <div style={{fontSize:9,color:"var(--amber)",...mono,background:"#f59e0b15",padding:"3px 8px",borderRadius:6,flexShrink:0}}>×{ex.xpMult}</div>
                </div>
              </div>
            </div>
            {lastW&&(<div style={{display:"flex",alignItems:"center",gap:6,marginBottom:6,flexWrap:"wrap"}}>
              <span style={{fontSize:10,color:"var(--text3)",...mono}}>Last: {lastW}kg</span>
              {pr&&<span style={{fontSize:10,color:"var(--amber)",...mono}}>PR: {pr.weight}kg</span>}
              <span style={{fontSize:10,color:"var(--green)",...mono,marginLeft:"auto"}}>Try {lastW+2.5}kg ↑</span>
            </div>)}

            {/* Warm-up sets */}
            {warmup.length>0&&(<div style={{marginBottom:8,padding:"8px 10px",background:"var(--bg3)",borderRadius:8,border:"1px solid var(--border)"}}>
              <div style={{fontSize:10,fontWeight:700,color:"var(--amber)",marginBottom:4,...mono}}>🔥 WARM-UP RAMP</div>
              <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>{warmup.map((w,i)=>(<span key={i} style={{fontSize:11,color:"var(--text2)",background:"var(--bg)",padding:"3px 8px",borderRadius:5,...mono}}>{w}kg × {i===0?10:5}</span>))}</div>
            </div>)}

            <div style={{display:"flex",alignItems:"center",gap:5}}>
              <button onClick={()=>setWeights(p=>({...p,[ei]:Math.max(0,(parseFloat(p[ei])||lastW||0)-2.5).toString()}))} style={{width:26,height:34,borderRadius:6,border:"none",background:"var(--bg3)",color:"var(--red)",fontWeight:800,fontSize:14,cursor:"pointer"}}>−</button>
              <input type="number" inputMode="decimal" placeholder="kg" value={weights[ei]||""} onChange={e=>setWeights(p=>({...p,[ei]:e.target.value}))} style={{width:52,padding:"7px 4px",borderRadius:7,border:"1px solid var(--border2)",background:"var(--bg3)",color:"var(--text)",fontSize:14,fontWeight:700,...mono,outline:"none",textAlign:"center"}}/>
              <button onClick={()=>setWeights(p=>({...p,[ei]:((parseFloat(p[ei])||lastW||0)+2.5).toString()}))} style={{width:26,height:34,borderRadius:6,border:"none",background:"var(--bg3)",color:"var(--green)",fontWeight:800,fontSize:14,cursor:"pointer"}}>+</button>
              <button onClick={()=>setPlateCalc(parseFloat(weights[ei])||lastW||60)} style={{width:26,height:34,borderRadius:6,border:"none",background:"var(--bg3)",color:"var(--amber)",fontWeight:700,fontSize:11,cursor:"pointer"}}>🔢</button>
              <button onClick={()=>setShowWarmup(showWarmup===ei?null:ei)} style={{width:26,height:34,borderRadius:6,border:"none",background:showWarmup===ei?"var(--amber)22":"var(--bg3)",color:"var(--amber)",fontWeight:700,fontSize:11,cursor:"pointer"}}>🔥</button>
              <div style={{display:"flex",gap:3,flex:1,justifyContent:"flex-end"}}>
                {Array.from({length:ex.sets}).map((_,si)=>{const done=completed[`${ei}-${si}`];return(
                  <button key={si} onClick={()=>toggleSet(ei,si)} style={{width:32,height:32,borderRadius:6,border:"none",cursor:"pointer",background:done?"linear-gradient(135deg,var(--amber),var(--red))":"var(--bg3)",color:done?"#fff":"var(--text5)",fontWeight:800,fontSize:11,transition:"all .2s",transform:done?"scale(1.05)":"scale(1)"}}>{done?"✓":si+1}</button>)})}
              </div>
            </div>
          </div>
        );
      })}
      <button onClick={finishWorkout} style={{width:"100%",padding:16,borderRadius:14,border:"none",marginTop:8,background:"linear-gradient(90deg,var(--amber),var(--red),var(--pink))",color:"#fff",fontWeight:800,fontSize:16,cursor:"pointer",letterSpacing:1}}>⚡ FINISH & GAIN XP</button>
      {modalEx&&<ExerciseModal exercise={modalEx} onClose={()=>setModalEx(null)} onSwap={alt=>handleSwap(modalEx._idx,alt)}/>}
      {restTimer&&<RestTimer duration={state.restTimerDuration||90} onClose={()=>setRestTimer(false)} onChangeDuration={d=>setState({...state,restTimerDuration:d})}/>}
      {ssTimer&&<RestTimer duration={30} isSuperset onClose={()=>setSsTimer(false)} onChangeDuration={()=>{}}/>}
      {plateCalc!==null&&<PlateCalcModal weight={plateCalc} onClose={()=>setPlateCalc(null)}/>}
    </div>
  );
}

// ═══ MEALS TAB ═══
function MealsTab({state,setState}){
  const [exp,setExp]=useState(null);const today=todayStr();
  const isRest=!(state.workoutLog||[]).some(l=>l.date&&l.date.startsWith(today));
  const logged=(state.restDayMeals||{})[today];
  const logMeals=()=>{const ns={...state,restDayMeals:{...(state.restDayMeals||{}),[today]:true},xp:state.xp+50};setState(ns);if(navigator.vibrate)navigator.vibrate([30,30,50])};
  return(
    <div style={{padding:"16px 16px 100px"}}>
      <div style={{fontSize:18,fontWeight:800,marginBottom:4}}>🍖 Meal Plan</div>
      <div style={{fontSize:11,color:"var(--amber)",marginBottom:2,...mono}}>Early Bird Bulk — 5:30 AM</div>
      <div style={{fontSize:10,color:"var(--text4)",marginBottom:14,...mono}}>{MEAL_PLAN.target}</div>
      {isRest&&(<div style={{background:logged?"#0d1a0d":"var(--bg2)",borderRadius:14,padding:16,marginBottom:14,border:`1px solid ${logged?"var(--green)33":"var(--amber)33"}`}}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <div><div style={{fontSize:13,fontWeight:700}}>{logged?"✅":"🍽️"} Rest Day Nutrition</div><div style={{fontSize:10,color:"var(--text3)",marginTop:2,...mono}}>{logged?"Logged! +50 XP":"Hit your meals for +50 XP"}</div></div>
          {!logged&&<button onClick={logMeals} style={{padding:"10px 16px",borderRadius:10,border:"none",background:"linear-gradient(90deg,var(--amber),var(--red))",color:"#fff",fontWeight:800,fontSize:12,cursor:"pointer"}}>LOG ✓</button>}
        </div>
      </div>)}
      {MEAL_PLAN.meals.map((m,i)=>(
        <div key={i} onClick={()=>setExp(exp===i?null:i)} style={{background:"var(--bg2)",borderRadius:14,padding:16,marginBottom:8,border:`1px solid ${exp===i?"var(--amber)33":"var(--border)"}`,cursor:"pointer"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
            <div style={{display:"flex",alignItems:"center",gap:10}}><span style={{fontSize:24}}>{m.icon}</span><div><div style={{fontSize:13,fontWeight:700}}>{m.name}</div><div style={{fontSize:10,color:"var(--text4)",...mono}}>{m.time}</div></div></div>
            <div style={{fontSize:10,color:"var(--amber)",...mono}}>{m.macros}</div>
          </div>
          {exp===i&&(<div style={{marginTop:12,paddingTop:12,borderTop:"1px solid var(--border)"}}>
            {m.note&&<div style={{fontSize:11,color:"var(--amber)",marginBottom:10,padding:"6px 10px",background:"#f59e0b08",borderRadius:8,borderLeft:"2px solid var(--amber)33"}}>{m.note}</div>}
            {m.items.map((item,j)=>(<div key={j} style={{display:"flex",alignItems:"center",gap:8,marginBottom:6}}><div style={{width:4,height:4,borderRadius:2,background:"var(--amber)"}}/><span style={{fontSize:12,color:"var(--text2)"}}>{item}</span></div>))}
          </div>)}
        </div>
      ))}
    </div>
  );
}

// ═══ LOG TAB ═══
function LogTab({state}){const logs=[...(state.workoutLog||[])].reverse();
return(<div style={{padding:"16px 16px 100px"}}>
  <div style={{fontSize:18,fontWeight:800,marginBottom:16}}>📊 Progress</div>
  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginBottom:16}}>
    <div style={{background:"var(--bg2)",borderRadius:12,padding:14,border:"1px solid var(--border)"}}><div style={{fontSize:10,color:"var(--text4)",...mono}}>Total XP</div><div style={{fontSize:20,fontWeight:800,color:"var(--amber)"}}>{state.xp.toLocaleString()}</div></div>
    <div style={{background:"var(--bg2)",borderRadius:12,padding:14,border:"1px solid var(--border)"}}><div style={{fontSize:10,color:"var(--text4)",...mono}}>Best</div><div style={{fontSize:20,fontWeight:800,color:"var(--green)"}}>{state.bestDay} XP</div></div>
  </div>
  <div style={{background:"var(--bg2)",borderRadius:14,padding:16,marginBottom:16,border:"1px solid var(--border)"}}>
    <div style={{fontSize:12,fontWeight:700,marginBottom:12}}>XP History</div>
    <div style={{display:"flex",gap:2,height:40,alignItems:"flex-end"}}>
      {logs.slice(0,20).reverse().map((l,i)=>{const mx=Math.max(...logs.map(x=>x.xp),1);return<div key={i} style={{flex:1,height:`${Math.max((l.xp/mx)*100,8)}%`,borderRadius:3,background:"linear-gradient(180deg,var(--amber),var(--red))",opacity:.5+(i/20)*.5,minWidth:4}}/>;
      })}{logs.length===0&&<div style={{fontSize:11,color:"var(--text5)",padding:8}}>Complete workouts to see progress</div>}
    </div>
  </div>
  <div style={{fontSize:13,fontWeight:700,marginBottom:10}}>Recent Sessions</div>
  {logs.length===0&&<div style={{color:"var(--text5)",fontSize:12,textAlign:"center",padding:32}}>No workouts yet</div>}
  {logs.map((l,i)=>(<div key={i} style={{background:"var(--bg2)",borderRadius:12,padding:14,marginBottom:6,border:"1px solid var(--border)",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
    <div><div style={{fontSize:12,fontWeight:600,color:"var(--text2)"}}>{l.day}</div><div style={{fontSize:10,color:"var(--text5)",...mono}}>{new Date(l.date).toLocaleDateString()}{l.duration?` · ${fmtTime(l.duration)}`:""}</div></div>
    <div style={{textAlign:"right"}}><div style={{fontSize:14,fontWeight:800,color:"var(--amber)"}}>+{l.xp} XP</div><div style={{fontSize:10,color:"var(--text5)",...mono}}>{l.weight.toLocaleString()}kg</div></div>
  </div>))}
</div>)}

// ═══ MAIN APP ═══
function GymLevels(){
  const [state,setState]=useState(()=>{const s=LS.get("gym-levels-state");return s?{...DEFAULT_STATE,...s}:{...DEFAULT_STATE}});
  const [tab,setTab]=useState("profile");
  const save=useCallback((ns)=>{setState(ns);LS.set("gym-levels-state",ns)},[]);
  
  // Apply AMOLED on load
  useEffect(()=>{if(state.amoled)document.body.classList.add("amoled")},[]);
  
  // Notification scheduler
  useEffect(()=>{
    if(!state.notificationsEnabled||!("Notification"in window))return;
    const check=()=>{const now=new Date();if(now.getHours()===5&&now.getMinutes()===0){new Notification("⚔️ Gym Levels",{body:"Time to train, warrior! Get after it.",icon:"icons/icon-192.png"})}};
    const iv=setInterval(check,60000);return()=>clearInterval(iv);
  },[state.notificationsEnabled]);

  return(
    <div style={{minHeight:"100vh",background:"var(--bg)",color:"var(--text)",fontFamily:"'DM Sans','Segoe UI',sans-serif",maxWidth:480,margin:"0 auto",position:"relative"}}>
      <div style={{padding:"14px 16px",display:"flex",justifyContent:"space-between",alignItems:"center",borderBottom:"1px solid var(--border)",position:"sticky",top:0,background:"var(--bg)",backdropFilter:"blur(12px)",zIndex:50,opacity:.97}}>
        <div style={{display:"flex",alignItems:"center",gap:8}}><span style={{fontSize:22}}>⚔️</span><span style={{fontSize:16,fontWeight:800,letterSpacing:-.5,background:"linear-gradient(90deg,var(--amber),var(--red))",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>GYM LEVELS</span></div>
        <div style={{display:"flex",alignItems:"center",gap:6}}><span style={{fontSize:12,fontWeight:700,color:"var(--amber)",...mono}}>LVL {getLevel(state.xp)}</span><span style={{fontSize:11,color:"var(--text5)"}}>·</span><span style={{fontSize:12,color:"var(--text3)",...mono}}>{state.xp.toLocaleString()} XP</span></div>
      </div>
      {tab==="profile"&&<ProfileTab state={state} setState={save}/>}
      {tab==="workout"&&<WorkoutTab state={state} setState={save}/>}
      {tab==="meals"&&<MealsTab state={state} setState={save}/>}
      {tab==="log"&&<LogTab state={state}/>}
      <TabBar active={tab} setActive={setTab}/>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<GymLevels/>);
</script>
<script>if('serviceWorker' in navigator)window.addEventListener('load',()=>navigator.serviceWorker.register('sw.js').catch(console.log))</script>
</body>
</html>
